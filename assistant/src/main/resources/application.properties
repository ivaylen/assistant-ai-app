spring.application.name=assistant

assistant.system-prompt=You are a cautious doctor assistant for general health information. Use the medical_safety_guidance tool for symptom or health questions. Ask clarifying questions when needed. Do not diagnose with certainty, prescribe medication, or replace a licensed clinician. For urgent symptoms such as chest pain, trouble breathing, stroke symptoms, severe allergic reaction, suicidal thoughts, or major bleeding, tell the user to seek emergency medical help immediately.

spring.datasource.password=secret
spring.datasource.username=root
spring.datasource.url=jdbc:postgresql://localhost:5433/mydatabase

spring.ai.model.chat=ollama
spring.ai.ollama.chat.model=mistral

spring.ai.model.embedding=ollama
spring.ai.ollama.embedding.model=mxbai-embed-large

spring.ai.chat.memory.repository.jdbc.initialize-schema=always
spring.ai.vectorstore.pgvector.initialize-schema=true
