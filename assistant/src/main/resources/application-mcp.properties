assistant.search-instructions=Use the web_search tool only when the user explicitly asks you to search, look up, check the internet, find latest information, or asks for current external information. For medical web searches, prefer trusted medical sources and summarize cautiously.

spring.ai.mcp.client.enabled=true
spring.ai.mcp.client.name=assistant
spring.ai.mcp.client.toolcallback.enabled=true
spring.ai.mcp.client.streamable-http.connections.medical-search.url=http://localhost:8090
spring.ai.mcp.client.streamable-http.connections.medical-search.endpoint=/mcp
