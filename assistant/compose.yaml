services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: assistant-postgres
    env_file:
      - .env.properties
    ports:
      - "5433:5432"
    volumes:
      - assistant-postgres-data:/var/lib/postgresql/data
      - ./src/main/resources/db/init:/docker-entrypoint-initdb.d:ro

volumes:
  assistant-postgres-data:
