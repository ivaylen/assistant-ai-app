spring.application.name=search-mcp-server
server.port=8090

spring.ai.mcp.server.name=search-mcp-server
spring.ai.mcp.server.version=0.0.1
spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.streamable-http.mcp-endpoint=/mcp
spring.ai.mcp.server.instructions=Provides a web_search tool for the doctor assistant. Prefer trusted medical sources for health questions and do not use search results as diagnosis.
